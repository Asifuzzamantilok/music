```yaml
workflows:
  my-music-player-android:

    name: My Music Player Android

    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      vars:
        PACKAGE_NAME: "com.mymusicplayer.app"

    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - ~/.gradle/caches
        - ~/.gradle/wrapper

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Analyze project
        script: |
          flutter analyze

      - name: Run tests
        script: |
          flutter test

      - name: Build Android APK
        script: |
          flutter build apk --release

      - name: Build Android App Bundle
        script: |
          flutter build appbundle --release

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab

    publishing:
      email:
        recipients:
          - tilok.mania@gmail.com
        notify:
          success: true
          failure: true
```
