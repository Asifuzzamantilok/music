```yaml
name: my_music_player
description: >
  A modern Android music player with offline playback,
  future online streaming support, home screen widgets,
  and an optional system-wide floating controller.

publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^15.1.2

  # Local Music
  on_audio_query: ^2.9.0
  just_audio: ^0.10.4
  audio_service: ^0.18.18
  audio_session: ^0.2.2

  # Permissions
  permission_handler: ^12.0.1

  # Local Storage
  shared_preferences: ^2.5.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utilities
  path_provider: ^2.1.5
  intl: ^0.20.2
  uuid: ^4.5.1

  # UI
  google_fonts: ^6.3.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.0

  # Animations
  flutter_animate: ^4.5.2
  animations: ^2.0.11

  # Widgets
  home_widget: ^0.8.0

  # Device Info
  device_info_plus: ^11.5.0
  package_info_plus: ^8.3.0

  # Connectivity (for future online mode)
  connectivity_plus: ^6.1.4

  # Logging
  logger: ^2.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
```

